
<!DOCTYPE html>
<html>
<head>
  <title>Auth Test - WORKS</title>
  <style>body{padding:2rem;font-family:system-ui}button{padding:1rem;margin:0.5rem;font-size:1rem;cursor:pointer}</style>
</head>
<body>
  <h1>🧪 Auth Test Page</h1>
  <p>Test your backend APIs directly:</p>

  <button onclick="registerStudent()">1. Register Student</button>
  <button onclick="loginStudent()">2. Login Student</button>
  <br><br>

  <pre id="result" style="background:#f5f5f5;padding:1rem;border-radius:0.5rem;font-size:0.9rem;max-height:400px;overflow:auto">Click buttons above...</pre>

  <script>
  const API_BASE = 'http://localhost:4000/api';

  async function apiCall(path, body) {
    try {
      const res = await fetch(`${API_BASE}${path}`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      const data = await res.json();
      document.getElementById('result').textContent = 
        `Status: ${res.status}
Response:
${JSON.stringify(data, null, 2)}`;
    } catch(err) {
      document.getElementById('result').textContent = `ERROR: ${err.message}`;
    }
  }

  async function registerStudent() {
    apiCall('/auth/register/student', {
      name: 'Frontend Test',
      email: 'frontend@test.com',
      branch: 'CS',
      semester: 4,
      password: 'pass123'
    });
  }

  async function loginStudent() {
    apiCall('/auth/login', {
      email: 'test@example.com',  // From your curl test
      password: 'pass123',
      role: 'student'
    });
  }
  </script>
</body>
</html>
